<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 50" preserveAspectRatio="none">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00fff9">
        <animate attributeName="stop-color" values="#00fff9;#ff00ff;#fcee0a;#39ff14;#00fff9" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#ff00ff">
        <animate attributeName="stop-color" values="#ff00ff;#fcee0a;#39ff14;#00fff9;#ff00ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#fcee0a">
        <animate attributeName="stop-color" values="#fcee0a;#39ff14;#00fff9;#ff00ff;#fcee0a" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="796" height="46" rx="8" ry="8" fill="none" stroke="url(#neonGradient)" stroke-width="3" filter="url(#glow)"/>
</svg>
