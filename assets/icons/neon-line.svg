<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 4">
  <defs>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00fff9">
        <animate attributeName="stop-color" values="#00fff9;#ff00ff;#fcee0a;#39ff14;#00fff9" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="33%" style="stop-color:#ff00ff">
        <animate attributeName="stop-color" values="#ff00ff;#fcee0a;#39ff14;#00fff9;#ff00ff" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="66%" style="stop-color:#fcee0a">
        <animate attributeName="stop-color" values="#fcee0a;#39ff14;#00fff9;#ff00ff;#fcee0a" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#39ff14">
        <animate attributeName="stop-color" values="#39ff14;#00fff9;#ff00ff;#fcee0a;#39ff14" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="600" height="4" rx="2" fill="url(#lineGradient)" filter="url(#glow)"/>
</svg>
